<header>
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top site-navbar">
    <div class="container">
      <a class="navbar-brand" href="{{ "/" | relURL }}" aria-label="Matlux home">
        <img src="{{ "images/matlux-mark.svg" | relURL }}" alt="" class="navbar-logo">
        <span class="brand-text">
          <span class="brand-name">Matlux</span>
          <span class="brand-suffix">Ltd</span>
        </span>
      </a>

      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav"
        aria-controls="navbarNav"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="menu-bars" id="menu-icon" aria-hidden="true"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          {{ range .Site.Menus.main }}
          <li class="nav-item">
            <a class="nav-link" href="{{ .URL | relURL }}">{{ .Name }}</a>
          </li>
          {{ end }}
        </ul>

        <div class="d-flex align-items-center gap-2 ms-lg-4 mt-3 mt-lg-0">
          <button id="theme-toggle" class="btn icon-button" type="button" aria-label="Toggle colour theme">
            <i class="fa-solid fa-circle-half-stroke"></i>
          </button>
          <a href="{{ "/contact/" | relURL }}" class="btn btn-custom-primary">Contact</a>
        </div>
      </div>
    </div>
  </nav>
</header>
